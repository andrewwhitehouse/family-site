{% extends "templates/base.html" %}

{% block content %}
<div class="feed">
  {% for post in posts %}
  <article class="post-summary">
    <header>
      <h2><a href="/posts/{{ post.slug }}">{{ post.title }}</a></h2>
      <p class="post-meta">
        <time datetime="{{ post.date }}">{{ post.date }}</time>
        {% for tag in post.tags %}<a class="tag" href="/tags/{{ tag }}">{{ tag }}</a>{% endfor %}
      </p>
    </header>
    <div class="post-body">
      {{ post.html|safe }}
    </div>
    <p class="read-more"><a href="/posts/{{ post.slug }}">Permalink</a></p>
  </article>
  {% endfor %}
</div>
{% endblock %}

{% block sidebar %}
{% include "templates/_sidebar.html" %}
{% endblock %}
