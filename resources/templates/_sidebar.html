<section class="sidebar-block">
  <h2>Tags</h2>
  <ul class="tag-list">
    {% for tag in tags %}
    <li><a href="/tags/{{ tag.name }}">{{ tag.name }}</a> <span class="muted">{{ tag.count }}</span></li>
    {% endfor %}
  </ul>
</section>

<section class="sidebar-block">
  <h2>About</h2>
  <p class="muted">A private place for the family to share news, photos, video
  and audio. Sign-in required.</p>
</section>
